name: Events-API CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docker image
        run: |
          docker build -t events-api:latest .
       
      - name: Run image
        run: |
          docker run -d -p 5000:5000 --name events-api-container events-api:latest
          sleep 5
          curl http://localhost:5000/api/health || exit 1

      - name: Setup python
        uses: actions/setup-python@v3
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest -v

      - name: Cleanup
        if: always()
        run: |
          docker stop events-api-container
          docker rm events-api-container

      - name: Login to Dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag your image
        run: |
          docker tag events-api:latest elenabai83/events-api:latest
          docker tag events-api:latest elenabai83/events-api:${{ github.sha }}

      - name: Push image to Dockerhub
        run: |
          docker push elenabai83/events-api:latest
          docker push elenabai83/events-api:${{ github.sha }}
      - name: Trigger Render Deployment
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
